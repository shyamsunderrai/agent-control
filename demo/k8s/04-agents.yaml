---
# Common ConfigMap shared by all agents
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: agent-control-demo
data:
  AGENT_CONTROL_URL: "http://agent-control:8000"
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.2:3b"
---
# ── Loan Underwriting Agent ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-underwriting-agent
  namespace: agent-control-demo
  labels:
    app: loan-underwriting-agent
    mas-airg: fairness-transparency-audit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-underwriting-agent
  template:
    metadata:
      labels:
        app: loan-underwriting-agent
    spec:
      containers:
      - name: agent
        image: agent-control-demo-agents:latest
        imagePullPolicy: Never   # loaded via k3d image import
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: agent-config
        env:
        - name: AGENT_TYPE
          value: loan_underwriting
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: loan-underwriting-agent
  namespace: agent-control-demo
spec:
  type: NodePort
  selector:
    app: loan-underwriting-agent
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30081
---
