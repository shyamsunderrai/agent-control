# Agent Control Rules Configuration
# 
# This file defines fine-grained controls that can be applied at different
# steps in your agent's execution flow.

# Rule: Prevent specific names from being used
regex-matching-name:
  step_id: "input-llm-span"
  description: "Disallow certain names from being used."
  enabled: true
  rules:
    - match: 
        string: ["Nachiket", "Lev", "Sam"]
      condition: any  # any, all, none
      action: deny    # deny, allow, warn, redact
      data: input     # What to check: input, output, context, messages, tool_calls, tool_results, metadata, state, all
  default_action: allow  # If no rules match

# Rule: Block prompt injection attempts
prompt-injection-protection:
  step_id: "input-validation"
  description: "Detect and block prompt injection attempts."
  enabled: true
  rules:
    - match:
        pattern: "(?i)(ignore|disregard|forget).*(previous|above|prior).*(instruction|prompt|rule)"
      condition: any
      action: deny
      data: input
    - match:
        pattern: "(?i)(system|admin|root).*(prompt|mode|access)"
      condition: any
      action: deny
      data: input
  default_action: allow

# Rule: Sensitive data in output
pii-protection:
  step_id: "output-validation"
  description: "Redact PII from agent outputs."
  enabled: true
  rules:
    - match:
        pattern: '\b\d{3}-\d{2}-\d{4}\b'  # SSN pattern
      condition: any
      action: redact
      data: output
      redact_with: "[SSN REDACTED]"
    - match:
        pattern: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'  # Email
      condition: any
      action: redact
      data: output
      redact_with: "[EMAIL REDACTED]"
  default_action: allow

# Rule: Monitor tool usage
restricted-tools:
  step_id: "tool-execution"
  description: "Restrict which tools can be called."
  enabled: true
  rules:
    - match:
        string: ["delete_database", "drop_table", "rm_rf"]
      condition: any
      action: deny
      data: tool_calls
  default_action: allow

# Rule: Content filtering
content-safety:
  step_id: "content-check"
  description: "Block unsafe content categories."
  enabled: true
  rules:
    - match:
        string: ["violence", "hate", "harassment"]
      condition: any
      action: deny
      data: all  # Check input, output, and context
    - match:
        pattern: "(?i)(hack|exploit|vulnerability)"
      condition: any
      action: warn
      data: input
  default_action: allow

# Rule: Context validation
context-requirements:
  step_id: "context-validation"
  description: "Ensure required context is present."
  enabled: true
  rules:
    - match:
        key_exists: ["user_id", "session_id"]
      condition: all
      action: allow
      data: context
  default_action: deny

# Rule: Message history limits
conversation-limits:
  step_id: "message-processing"
  description: "Enforce conversation limits."
  enabled: true
  rules:
    - match:
        message_count: 
          max: 50
      condition: any
      action: deny
      data: messages
      message: "Conversation limit reached. Please start a new session."
  default_action: allow

# Rule: Rate limiting by user
rate-limiting:
  step_id: "request-validation"
  description: "Rate limit requests per user."
  enabled: true
  rules:
    - match:
        rate:
          window: 60  # seconds
          max_requests: 10
      condition: any
      action: deny
      data: metadata
  default_action: allow

# Rule: Custom business logic
business-rules:
  step_id: "business-validation"
  description: "Enforce business-specific rules."
  enabled: true
  rules:
    - match:
        custom:
          field: "user_tier"
          operator: "=="
          value: "free"
        string: ["premium_feature", "advanced_mode"]
      condition: all
      action: deny
      data: context
      message: "This feature requires a premium subscription."
  default_action: allow

