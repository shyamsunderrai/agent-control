name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agent_protect
          POSTGRES_USER: agent_protect
          POSTGRES_PASSWORD: agent_protect
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U agent_protect -d agent_protect" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: agent_protect
      DB_PASSWORD: agent_protect
      DB_DATABASE: agent_protect

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Show versions
        run: |
          uv --version
          python --version

      - name: Sync dependencies
        run: make sync

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Test
        run: make test

  ui-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./ui
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ./ui
        run: pnpm run lint

      - name: Type check
        working-directory: ./ui
        run: pnpm run typecheck