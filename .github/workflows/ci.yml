name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Show versions
        run: |
          uv --version
          python --version

      - name: Sync dependencies
        run: make sync

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck