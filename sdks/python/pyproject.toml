[project]
name = "agent-control"
version = "0.1.0"
description = "Python SDK for Agent Control - unified agent control, monitoring, and rule enforcement"
requires-python = ">=3.12"
dependencies = [
    "agent-control-models>=0.1.0",
    "httpx>=0.26.0",
    "pydantic>=2.5.0",
    "pyyaml>=6.0.0",
]
authors = [
    {name = "Agent Control Team"}
]
readme = "README.md"
license = {text = "Apache-2.0"}
keywords = ["agent", "protection", "security", "sdk", "llm", "ai-safety"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/yourusername/agent-protect"
Documentation = "https://github.com/yourusername/agent-protect#readme"
Repository = "https://github.com/yourusername/agent-protect"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.1.0",
    "mypy>=1.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_control"]
