# Agent Protect Root Configuration
# 
# This project has been split into separate workspaces:
# - sdks/ - SDK implementations workspace
# - server/ - Server workspace
# - models/ - Shared models package (referenced by both workspaces)
#
# To work with each component, navigate to its directory and use uv commands there.

[tool.uv.workspace]
members = ["models", "server", "sdks/python", "engine"]

[tool.uv.sources]
agent-control-models = { workspace = true }
agent-control-engine = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = []

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = "re2"
ignore_missing_imports = true

