# Agent Control Server - Docker Compose Configuration
#
# Quick Start:
#   docker compose up -d
#
# Services:
#   - PostgreSQL database (port 5432)
#   - Agent Control Server API (port 8000)
#   - Agent Control UI Dashboard (port 4000)
#
# The images are published to Docker Hub at:
#   galileoai/agent-control-server:latest
#   galileoai/agent-control-ui:latest
#
# This compose file builds UI from local source so NEXT_PUBLIC_* variables are
# baked at build time.
#
# For local development (run server with uvicorn), use:
#   docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_control_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_control
      POSTGRES_USER: agent_control
      POSTGRES_PASSWORD: agent_control
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_control -d agent_control"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    image: galileoai/agent-control-server:latest
    container_name: agent_control_server
    ports:
      - "8000:8000"
    environment:
      # Database connection (uses Docker service name 'postgres')
      # Use postgresql+psycopg:// (supports both sync migrations and async app code)
      DATABASE_URL: postgresql+psycopg://agent_control:agent_control@postgres:5432/agent_control
      # Server configuration
      HOST: 0.0.0.0
      PORT: 8000
      # API authentication defaults (override via environment variables)
      AGENT_CONTROL_API_KEY_ENABLED: ${AGENT_CONTROL_API_KEY_ENABLED:-true}
      AGENT_CONTROL_API_KEYS: ${AGENT_CONTROL_API_KEYS:-420c6b90714b45beaa992c3f05cf2baf}
      AGENT_CONTROL_ADMIN_API_KEYS: ${AGENT_CONTROL_ADMIN_API_KEYS:-29af8554a1fe4311977b7ce360b20cc3}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ui:
    image: agent-control-ui-local:latest
    pull_policy: build
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_AGENT_CONTROL_API_KEY: ${NEXT_PUBLIC_AGENT_CONTROL_API_KEY:-29af8554a1fe4311977b7ce360b20cc3}
    container_name: agent_control_ui
    ports:
      - "4000:4000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
